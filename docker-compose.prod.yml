---
# Triageo — Production Docker Compose
# Configures logging rotation limits suitable for home server stability.
# Ports: API 8004, Web 3004 (default host bindings)

name: triageo-prod

services:

  api:
    container_name: triageo-api
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: triageo-api:latest
    restart: always
    env_file:
      - .env
    ports:
      - "${HOST_IP:-10.0.1.36}:${API_PORT:-8004}:8000"
    networks:
      - triageo-network
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    container_name: triageo-web
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: triageo-web:latest
    restart: always
    ports:
      - "${HOST_IP:-10.0.1.36}:${WEB_PORT:-3004}:80"
    networks:
      - triageo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  triageo-network:
    name: triageo-network
    driver: bridge
